<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader TikTok Vikk | Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS STYLE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
            color: white;
        }

        /* Video Background */
        #bgVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 450px;
            animation: fadeInContainer 1s ease-out;
            z-index: 10;
        }

        /* Banner Box (Persegi Panjang Atas) */
        .banner-box {
            width: 100%;
            height: 100px;
            border-radius: 20px 20px 0 0;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: none;
        }

        .banner-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .banner-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 1rem;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 15px rgba(37, 244, 238, 0.8);
        }

        /* Main Card (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 0 0 25px 25px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fe2c55, #25f4ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Input & Button */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #25f4ee;
            background: rgba(0, 0, 0, 0.6);
        }

        .btn-download {
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #fe2c55, #6e00ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(254, 44, 85, 0.3);
        }

        .btn-download:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 15px 30px rgba(254, 44, 85, 0.5);
        }

        /* Result Section */
        #resultArea {
            display: none;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.6s ease;
        }

        .thumb-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 15px;
            margin: 0 auto 15px;
            border: 2px solid #25f4ee;
            display: block;
        }

        .video-info { font-size: 0.9rem; margin-bottom: 20px; display: block; }

        /* Social Icons */
        .social-footer {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .social-icon {
            font-size: 2.2rem;
            color: white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .social-icon:hover {
            transform: translateY(-10px) scale(1.2);
        }

        .tiktok:hover { color: #fe2c55; filter: drop-shadow(0 0 10px #fe2c55); }
        .telegram:hover { color: #0088cc; filter: drop-shadow(0 0 10px #0088cc); }

        /* Animations */
        @keyframes fadeInContainer {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loader */
        .loader { display: none; margin: 20px 0; }
        .spinner {
            width: 35px;
            height: 35px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #fe2c55;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <video autoplay muted loop id="bgVideo">
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="container">
        <div class="banner-box">
            <video autoplay muted loop class="banner-video">
                <source src="banner.mp4" type="video/mp4">
            </video>
            <div class="banner-text">Vikk Digital Studio</div>
        </div>

        <div class="card">
            <h1>Downloader TikTok Vikk</h1>
            <p class="subtitle">FAST • NO WATERMARK • HD</p>

            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Tempel tautan video di sini...">
                <button class="btn-download" onclick="handleDownload()" id="btnAction">
                    <i class="fas fa-bolt"></i> GET VIDEO
                </button>
            </div>

            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p style="font-size: 0.7rem; margin-top: 10px; color: #25f4ee;">PROCESSING DATA...</p>
            </div>

            <div id="resultArea">
                <img id="vidThumb" src="" class="thumb-preview">
                <span id="vidAuthor" style="font-weight: bold; color: #25f4ee;"></span>
                <span id="vidTitle" class="video-info"></span>
                <button class="btn-download" id="finalDownloadBtn" style="background: #25f4ee; color: #000; width: 100%;">
                    <i class="fas fa-cloud-download-alt"></i> DOWNLOAD HD NOW
                </button>
            </div>
        </div>

        <div class="social-footer">
            <a href="https://www.tiktok.com/@vikk.digital.store.id?_r=1&_t=ZS-94LodpYIsPn" target="_blank" class="social-icon tiktok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://t.me/vikkdigitalstore" target="_blank" class="social-icon telegram">
                <i class="fab fa-telegram-plane"></i>
            </a>
        </div>
    </div>

    <script>
        // Data dari API Key yang Anda berikan
        const apiData = {
            "status": true,
            "data": {
                "type": "video",
                "title": "No description",
                "thumbnail": "https://p19-common-sign.tiktokcdn-us.com/tos-maliva-p-0068/oMxHIkIGqneFeRpB4cehRT4QjnLe4GAwITEzwA~tplv-tiktokx-origin.image?dr=9636&x-expires=1772542800&x-signature=NoDvQPSwxDn27%2BIv%2BXsoD0u9aM8%3D&t=4d5b0474&ps=13740610&shp=81f88b70&shcp=43f4a2f9&idc=useast5",
                "author": "( K.T. ) BAJANG PRAYA",
                "media": [
                    {
                        "quality": "HD",
                        "url": "https://api.snaptik.app/v2/tiktok/hd_download_url?client_id=snaptik/250321&token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpZCI6Ijc0MzU3MDgwNjA1NDQyOTAxMDQiLCJpYXQiOjE3NzI0NDc4MTN9.zOYskTtFF3D6LMr4ASUICa9TG_9QYBp-yQVRnyMJ9GA"
                    }
                ]
            }
        };

        function handleDownload() {
            const input = document.getElementById('urlInput').value;
            const btn = document.getElementById('btnAction');
            const loader = document.getElementById('loader');
            const result = document.getElementById('resultArea');

            if (!input) {
                alert("Mohon masukkan link TikTok!");
                return;
            }

            // Animasi Loading
            btn.style.display = 'none';
            result.style.display = 'none';
            loader.style.display = 'block';

            // Simulasi pengambilan data API
            setTimeout(() => {
                loader.style.display = 'none';
                btn.style.display = 'flex';

                // Mengisi data dari API ke UI
                document.getElementById('vidThumb').src = apiData.data.thumbnail;
                document.getElementById('vidAuthor').innerText = apiData.data.author;
                document.getElementById('vidTitle').innerText = apiData.data.title;
                
                const hdLink = apiData.data.media[0].url;
                document.getElementById('finalDownloadBtn').onclick = () => {
                    window.open(hdLink, '_blank');
                };

                result.style.display = 'block';
            }, 2000);
        }
    </script>
</body>
</html>
